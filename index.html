*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    font-family:'Poppins',sans-serif;
    background:#040611;
    position:relative;
}

/* =======================================================
BACKGROUND
======================================================= */

#bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-5;

    filter:
    brightness(.95)
    saturate(1.1);
}

/* DARK OVERLAY */

.overlay{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
    to top,
    rgba(0,0,0,.82),
    rgba(0,0,0,.18)
    );

    z-index:-4;
}

/* MAGIC GLOW */

.magic-glow{
    position:absolute;
    inset:0;
    pointer-events:none;

    background:
    radial-gradient(circle at 50% 85%,
    rgba(255,180,120,.12),
    transparent 35%);
}

/* =======================================================
HEADER
======================================================= */

.header{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);

    width:max-content;

    text-align:center;
    color:white;
    z-index:20;

    padding:0 20px;
}

.header h1{
    font-family:'Playfair Display',serif;

    font-size:clamp(2.4rem,5vw,4rem);

    color:#ffe4b7;

    padding:12px 32px;

    border-radius:24px;

    background:
    rgba(0,0,0,.35);

    backdrop-filter:blur(14px);

    text-shadow:
    0 0 20px rgba(255,210,140,.5),
    0 0 50px rgba(255,210,140,.3);

    animation:floatTitle 5s ease-in-out infinite;

    box-shadow:
    0 0 40px rgba(0,0,0,.35);
}

.header p{
    margin-top:14px;

    color:rgba(255,255,255,.88);

    letter-spacing:2px;

    font-size:.9rem;

    padding:8px 18px;

    border-radius:14px;

    background:
    rgba(0,0,0,.22);

    backdrop-filter:blur(10px);

    display:inline-block;
}

@keyframes floatTitle{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-6px);
    }
}

/* =======================================================
STARS
======================================================= */

#stars{
    position:absolute;
    inset:0;
    z-index:2;
}

.star{
    position:absolute;

    border-radius:50%;

    background:white;

    box-shadow:
    0 0 10px white,
    0 0 25px #ffd27a,
    0 0 40px #ffd27a;

    cursor:pointer;

    animation:
    twinkle 2s infinite alternate;

    transition:.3s;
}

.star::before{
    content:'';

    position:absolute;

    left:50%;
    top:50%;

    width:22px;
    height:22px;

    transform:
    translate(-50%,-50%);

    border-radius:50%;
}

.star:hover{
    transform:scale(1.7);
}

@keyframes twinkle{

    from{
        opacity:.45;
    }

    to{
        opacity:1;
    }
}

/* =======================================================
BOTTOM LINE
======================================================= */

.bottom-line{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;

    color:rgba(255,255,255,.65);

    font-size:.82rem;

    letter-spacing:1px;

    z-index:15;
}

/* =======================================================
VIEWER
======================================================= */

#viewer{

    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;
    pointer-events:none;

    transition:.45s ease;

    z-index:100;
}

#viewer.show{

    opacity:1;
    pointer-events:auto;
}

#viewer-bg{

    position:absolute;
    inset:0;

    background:
    rgba(0,0,0,.84);

    backdrop-filter:blur(16px);
}

/* CARD */

.viewer-card{

    position:relative;

    width:min(900px,94vw);

    transform:scale(.82);

    opacity:0;

    transition:.45s ease;

    z-index:5;
}

#viewer.show .viewer-card{

    transform:scale(1);

    opacity:1;
}

/* =======================================================
IMAGE BOX
======================================================= */

.image-box{

    border-radius:26px;

    overflow:auto;

    max-width:94vw;
    max-height:72vh;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 0 80px rgba(0,0,0,.75),
    0 0 50px rgba(255,210,120,.2);
}

.image-box img{

    display:block;

    width:auto;
    height:auto;

    max-width:100%;
    max-height:72vh;

    object-fit:contain;
}

/* =======================================================
QUOTE BOX
======================================================= */

    margin-top:18px;

    background:
    rgba(14,16,26,.92);

    border:
    1px solid rgba(255,220,160,.18);

    border-radius:24px;

    padding:28px;

    text-align:center;

    color:white;

    backdrop-filter:blur(10px);

    box-shadow:
    0 10px 40px rgba(0,0,0,.45);
}

.quote-box h2{

    font-family:'Playfair Display',serif;

    font-size:clamp(1.2rem,2vw,2rem);

    line-height:1.6;

    color:#fff7ea;
}

.quote-box p{

    margin-top:14px;

    color:rgba(255,255,255,.7);

    letter-spacing:2px;

    font-size:.8rem;
}

/* =======================================================
CLOSE
======================================================= */

.close{

    position:absolute;

    top:-18px;
    right:-18px;

    width:54px;
    height:54px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    rgba(255,255,255,.08);

    border:
    1px solid rgba(255,255,255,.18);

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:.3s;
}

.close:hover{

    transform:
    rotate(90deg)
    scale(1.1);

    background:
    rgba(255,255,255,.18);
}

@media(max-width:768px){

    .header{

        padding:20px;
    }

    .close{

        height:46px;
    }

    .header h1{
        padding:10px 22px;
    }
}

const images =
[...document.querySelectorAll(".photo img")];

/* =======================================================
CREATE STARS
======================================================= */

const starsContainer =
document.getElementById("stars");

const title =
document.querySelector(".header");

const titleRect =
title.getBoundingClientRect();

images.forEach((img,index)=>{

    const star =
    document.createElement("div");

    star.className = "star";

    let x,y;

    do{

        x = Math.random()*92;
        y = Math.random()*78;

    }while(

        x > 28 &&
        x < 72 &&
        y > 0 &&
        y < 24

    );

    star.style.left = x + "%";
    star.style.top = y + "%";

    /* RANDOM SIZE */

    const size =
    4 + Math.random()*10;

    star.style.width =
    size + "px";

    star.style.height =
    size + "px";

    /* RANDOM TWINKLE SPEED */

    star.style.animationDuration =
    1 + Math.random()*3 + "s";

    starsContainer.appendChild(star);

    /* CLICK */

    star.addEventListener("click",()=>{

        const q =
        quotes[Math.floor(Math.random()*quotes.length)];

        document.getElementById("viewerImg").src =
        img.src;

        document.getElementById("viewerQuote").innerText =
        `"${q.text}"`;

        document.getElementById("viewerAuthor").innerText =
        `— ${q.author}`;

        document.getElementById("viewer")
        .classList.add("show");
    });
});
